# FILE: haveri/docker-compose.yml
# PHOENIX PROTOCOL - HAVERI CLEAN INSTANCE V1.0
# - Removed ai-service (shared, already running)
# - Removed caddy (global-gateway already running)
# - Isolated volumes with "haveri_" prefix to avoid juristi conflict
# - Removed obsolete 'version' line

services:
  # --- HAVERI BACKEND ---
  backend:
    build: { context: ./backend }
    container_name: haveri-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --proxy-headers
    env_file: ./.env
    volumes:
      - ./backend:/app
    networks:
      - haveri_net
      - shared_gateway_net
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      # ai-service dependency removed (already running externally)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- HAVERI ASYNC WORKER ---
  celery:
    build: { context: ./backend }
    container_name: haveri-celery
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4
    env_file: ./.env
    volumes:
      - ./backend:/app
    networks:
      - haveri_net
      - shared_gateway_net   # Added to allow AI service access
    depends_on:
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }

  # --- DATA LAYER ---
  mongo:
    image: mongo:6.0
    container_name: haveri-mongo
    restart: unless-stopped
    env_file: ./.env
    networks:
      - haveri_net
    volumes:
      - haveri_mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: haveri-redis
    restart: unless-stopped
    networks:
      - haveri_net
    volumes:
      - haveri_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: haveri-chroma
    restart: unless-stopped
    networks:
      - haveri_net
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - haveri_chroma_data:/data

  neo4j:
    image: neo4j:5
    container_name: haveri-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
    volumes:
      - haveri_neo4j_data:/data
    networks:
      - haveri_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  haveri_mongo_data: {}
  haveri_chroma_data: {}
  haveri_redis_data: {}
  haveri_neo4j_data: {}

networks:
  haveri_net:
    driver: bridge
  shared_gateway_net:
    external: true