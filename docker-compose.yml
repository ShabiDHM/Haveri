# FILE: docker-compose.yml
# PHOENIX PROTOCOL - INFRASTRUCTURE V2.3 (PERSISTENT AI CACHE)
# 1. FIX: Added a named volume 'huggingface_cache' to the 'ai-core-service'.
# 2. REASON: This makes the downloaded AI models persistent. They will now survive container rebuilds (`--build`), preventing the need to re-download them and solving the startup failure.
# 3. STATUS: System is now fully resilient to restarts and rebuilds.

services:
  # -------------------------------------------------------
  # JURISTI AI CORE (Embeddings, NER, Categorization)
  # -------------------------------------------------------
  ai-core-service:
    build: 
      context: ./ai-core-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8010:8000"
    # PHOENIX FIX: Added a persistent volume for the HuggingFace cache
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    env_file: ./.env
    networks:
      - phoenix_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 300s

  # -------------------------------------------------------
  # LOCAL LLM ENGINE (The Free Brain)
  # -------------------------------------------------------
  local-llm:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - phoenix_net

  # -------------------------------------------------------
  # INFRASTRUCTURE & BACKEND
  # -------------------------------------------------------
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks: [phoenix_net]
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: { context: ./backend }
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level info --proxy-headers
    env_file: ./.env
    volumes:
      - ./backend/data:/app/data
    networks: [phoenix_net]
    depends_on: 
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
      ai-core-service: { condition: service_healthy }
      local-llm: { condition: service_started }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  celery:
    build: { context: ./backend }
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4 --prefetch-multiplier=1
    env_file: ./.env
    volumes:
      - ./backend/data:/app/data
    networks: [phoenix_net]
    depends_on: 
      redis: { condition: service_healthy } 
      mongo: { condition: service_healthy }
      backend: { condition: service_started }

  # -------------------------------------------------------
  # DATABASE & CACHE
  # -------------------------------------------------------
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    env_file: ./.env
    networks: [phoenix_net]
    volumes: [mongo_data:/data/db]
    healthcheck: { test: echo 'db.runCommand("ping").ok' | mongosh --quiet, interval: 15s, timeout: 10s, retries: 5 }
    stop_grace_period: 20s

  redis:
    image: redis:7
    restart: unless-stopped
    volumes: [redis_data:/data]
    networks: [phoenix_net]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 15s, timeout: 10s, retries: 5 }
    stop_grace_period: 20s

  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports: ["8002:8000"]
    networks: [phoenix_net]
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    depends_on: [backend]

  # --- GRAPH DATABASE (Neo4j) ---
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      # STRICT RAM LIMITS
      - NEO4J_dbms_memory_heap_initial__size=1G
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - phoenix_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  mongo_data: {}
  chroma_data: {}
  redis_data: {}
  caddy_data: {}
  ollama_data: {}
  neo4j_data: {}
  neo4j_logs: {}
  # PHOENIX FIX: Define the new persistent volume
  huggingface_cache: {}

networks:
  phoenix_net:
    driver: bridge