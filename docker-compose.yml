# FILE: haveri/docker-compose.yml (CENTRALIZED AI HOST)
version: '3.8'
services:
  # THE SHARED BRAIN
  ai-service:
    build: { context: ./ai-core-service }
    container_name: unified-ai-service
    restart: unless-stopped
    volumes: [huggingface_cache:/root/.cache/huggingface]
    env_file: ./.env
    networks: [haveri_net, shared_gateway_net]
    deploy: { resources: { limits: { memory: 8G } } } # Allocating enough for both projects
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:8000/health"], interval: 30s }

  backend:
    build: { context: ./backend }
    container_name: haveri-backend
    restart: unless-stopped
    env_file: ./.env
    ports: ["8001:8000"]
    networks: [haveri_net, shared_gateway_net]
    depends_on: { mongo: { condition: service_healthy }, ai-service: { condition: service_healthy } }

  caddy:
    image: caddy:latest
    container_name: global-gateway
    ports: ["80:80", "443:443"]
    volumes: [./Caddyfile:/etc/caddy/Caddyfile, caddy_data:/data]
    networks: [shared_gateway_net]
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    container_name: haveri-mongo
    networks: [haveri_net]
    volumes: [mongo_data:/data/db]
    healthcheck: { test: echo 'db.runCommand("ping").ok' | mongosh --quiet, interval: 15s }

  chroma:
    image: chromadb/chroma:latest
    container_name: haveri-chroma
    ports: ["8002:8000"]
    networks: [haveri_net]
    volumes: [chroma_data:/data]

networks:
  haveri_net:
  shared_gateway_net:
    external: true
volumes:
  mongo_data: {}
  chroma_data: {}
  caddy_data: {}
  huggingface_cache: {}